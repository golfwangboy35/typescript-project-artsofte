<mat-sidenav-container class="main-layout">
  <mat-sidenav
    #drawer
    class="main-layout__sidenav"
    [mode]="isHandset() ? 'over' : 'side'"
    [opened]="!isHandset()"
    [fixedInViewport]="true"
  >
    <app-sidebar />
  </mat-sidenav>

  <mat-sidenav-content class="main-layout__shell">
    @if (isHandset()) {
      <header class="main-layout__toolbar">
        <button
          mat-icon-button
          type="button"
          class="main-layout__menu-btn"
          (click)="drawer.toggle()"
          aria-label="Открыть меню"
        >
          <mat-icon>menu</mat-icon>
        </button>
        <span class="main-layout__toolbar-title">FinanceApp</span>
      </header>
    }

    <main class="main-layout__content">
      <router-outlet />
    </main>
  </mat-sidenav-content>
</mat-sidenav-container>
